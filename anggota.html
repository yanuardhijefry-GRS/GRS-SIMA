<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRS-SIMA | Tambah Anggota</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#eef3f8;
}

.header{
background:#0B3C74;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:900px;
max-width:95%;
margin:30px auto;
background:white;
border-radius:10px;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.row{
display:flex;
gap:15px;
margin-bottom:15px;
}

.col{
flex:1;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#333;
}

input,
select,
textarea{

width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:15px;

}

textarea{

resize:none;
height:80px;

}

.preview{

width:150px;
height:190px;
border:2px dashed #ccc;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin:auto;
border-radius:8px;

}

.preview img{

width:100%;
height:100%;
object-fit:cover;

}

.button-area{

display:flex;
gap:15px;
margin-top:25px;

}

button{

flex:1;
padding:14px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;

}

.btn-save{

background:#0B6EFD;
color:white;

}

.btn-back{

background:#6c757d;
color:white;

}

</style>

</head>

<body>

<div class="header">

GRS-SIMA
<br>
Tambah Data Anggota

</div>

<div class="container">

<div class="row">

<div class="col">

<label>Nomor Register Anggota</label>

<input
type="text"
id="nomor">

</div>

<div class="col">

<label>Nama Lengkap</label>

<input
type="text"
id="nama">

</div>

</div>

<div class="row">

<div class="col">

<label>NIK</label>

<input
type="text"
id="nik">

</div>

<div class="col">

<label>Jabatan</label>

<select id="jabatan">

<option>Ketua</option>
<option>Wakil Ketua</option>
<option>Sekretaris</option>
<option>Bendahara</option>
<option>Koordinator</option>
<option>Anggota</option>

</select>

</div>

</div><div class="row">

<div class="col">

<label>No HP</label>

<input
type="text"
id="hp">

</div>

<div class="col">

<label>Email</label>

<input
type="email"
id="email">

</div>

</div>

<div class="row">

<div class="col">

<label>Alamat</label>

<textarea id="alamat"></textarea>

</div>

</div>

<div class="row">

<div class="col">

<label>Foto Anggota</label>

<input
type="file"
id="foto"
accept="image/*"
onchange="previewFoto(event)">

</div>

<div class="col">

<div class="preview">

<img
id="preview"
src="img/logo.png">

</div>

</div>

</div>

<div class="button-area">

<button
class="btn-save"
onclick="simpanData()">

💾 Simpan Data

</button>

<button
class="btn-back"
onclick="window.location.href='dashboard.html'">

⬅ Kembali

</button>

</div>

</div>


<script type="module" src="js/app.js"></script>

</body>
</html>
