<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Anggota - GRS SIMA</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">

<div class="brand">
<h2>GRS-SIMA</h2>
<p>Gading Rescue Squad</p>
</div>

<a href="dashboard.html">Dashboard</a>
<a href="anggota.html">Tambah Anggota</a>
<a href="data-anggota.html">Data Anggota</a>

</div>

<div class="content">

<h1>Tambah Anggota</h1>

<form id="formAnggota">

<label>Nomor Anggota</label>

<input
type="text"
id="id"
readonly>

<label>Nama Lengkap</label>

<input
type="text"
id="nama"
required>

<label>Jabatan</label>

<input
type="text"
id="jabatan"
required>

<label>Alamat</label>

<textarea
id="alamat"
required></textarea>

<label>No HP</label>

<input
type="text"
id="hp">

<label>Upload Foto</label>

<input
type="file"
id="foto"
accept="image/*">

<img
id="preview"
class="preview">

<button type="submit">

SIMPAN

</button>

</form>

</div>

<script src="js/anggota.js"></script>

</body>
</html>
