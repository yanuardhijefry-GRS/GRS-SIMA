<div class="content fade">

<h1>📅 Rencana Giat</h1>

<p>Kelola seluruh rencana kegiatan Gading Rescue Squad.</p>

<div class="toolbar">

<input
type="text"
id="cariGiat"
placeholder="🔍 Cari kegiatan..."
>

<button id="btnTambah">
+ Tambah Rencana Giat
</button>

</div>

<div class="table-container">

<table class="table">

<thead>

<tr>

<th width="120">Tanggal</th>

<th>Nama Kegiatan</th>

<th width="160">Jenis</th>

<th>Lokasi</th>

<th width="120">Status</th>

<th width="150">Aksi</th>

</tr>

</thead>

<tbody id="dataGiat">

<tr>

<td colspan="6" style="text-align:center;padding:25px">

Belum ada data Rencana Giat

</td>

</tr>
  
</tbody>

</table>

</div>

</div> <!-- content -->

<!-- Modal Rencana Giat -->
<div id="modalGiat" class="modal">

<div class="modal-content">

<h2>📅 Tambah Rencana Giat</h2>

<form id="formGiat">

<label>Nama Kegiatan</label>
<input type="text" id="namaGiat" required>

<label>Jenis Kegiatan</label>
<select id="jenisGiat">
<option>Kebencanaan</option>
<option>SAR</option>
<option>Kesehatan</option>
<option>Pelatihan</option>
<option>Sosial</option>
<option>Siaga Khusus</option>
<option>Rapat</option>
<option>Lainnya</option>
</select>

<label>Tanggal Mulai</label>
<input type="date" id="tglMulai">

<label>Lokasi</label>
<input type="text" id="lokasi">

<div class="modal-action">

<button type="button" id="btnBatal">
Batal
</button>

<button type="submit">
Simpan
</button>

</div>

</form>

</div>

</div>

</div>

<script src="js/rengit.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
