<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - GRS-SIMA</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>
<button id="menuBtn" class="menu-btn">☰</button>
<div class="sidebar" id="sidebar">

<div class="brand">
<img src="img/logo.PNG">  
<h2>GRS-SIMA</h2>
<small>Gading Rescue Squad</small>
</div>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="anggota.html">👤 Tambah Anggota</a>

<a href="data-anggota.html">📋 Data Anggota</a>

<a href="scan.html">📷 Scan QR</a>

<a href="kta.html">🪪 Cetak KTA</a>

<a href="#" onclick="logout()">🚪 Logout</a>

</div>

<div class="content">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">

<h3>Total Anggota</h3>

<h2 id="totalAnggota">0</h2>

  <div class="card">

<h3>Backup Data</h3>

<button onclick="exportData()">

Export JSON

</button>

</div>

<div class="card">

<h3>Restore Data</h3>

<input
type="file"
id="importFile"
accept=".json">

</div>

<div class="card">

<h3>Reset Data</h3>

<button onclick="resetData()">

Hapus Semua

</button>

</div>

</div>

<div class="card">

<h3>Status Login</h3>

<h2>Admin</h2>

</div>

</div>

<h2>Menu Cepat</h2>

<div class="menu-grid">

<a href="anggota.html" class="menu-box">
Tambah Anggota
</a>

<a href="data-anggota.html" class="menu-box">
Data Anggota
</a>

<a href="scan.html" class="menu-box">
Scan QR
</a>

<a href="kta.html" class="menu-box">
Cetak KTA
</a>

</div>

</div>

<script>

if(localStorage.getItem("login")!="true"){

window.location="index.html";

}

let anggota =
JSON.parse(localStorage.getItem("anggota")) || [];

document.getElementById("totalAnggota").innerHTML=
anggota.length;

function logout(){

localStorage.removeItem("login");

window.location="index.html";

}

</script>
<script src="js/dashboard.js"></script>
<script src="js/export.js"></script>
</body>
</html>
