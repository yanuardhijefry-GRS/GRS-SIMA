<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRS-SIMA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b2d59;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:380px;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{
color:#0b2d59;
margin-bottom:5px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ffb400;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f5a000;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}
</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>GRS-SIMA</h1>

<p>Gading Rescue Squad</p>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>LOGIN ADMIN</button>

<div class="footer">

© 2026 Gading Rescue Squad

</div>

</div>

</body>

</html>
