<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRS-SIMA Login</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login{

width:400px;
max-width:95%;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;

}

.logo{

width:130px;
margin-bottom:20px;

}

.login h2{

margin-bottom:20px;
color:#0B3C74;

}

</style>

</head>

<body>

<div class="login">

<img src="img/logo.PNG" class="logo alt="Logo">

<h2>GRS-SIMA</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

LOGIN

</button>

</div>

<script>

function login(){

let u=document.getElementById("username").value;

let p=document.getElementById("password").value;

if(u==="admin" && p==="123456"){

window.location.href="dashboard.html";

}else{

alert("Username atau Password salah");

}

}

</script>

</body>
</html>
